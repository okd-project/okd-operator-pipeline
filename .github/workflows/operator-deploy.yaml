on:
  workflow_call:
    inputs:
      operator:
        description: "Operator name/directory to build and deploy"
        type: string
        required: true
      base_registry:
        description: "Base registry URL (default: quay.io/okderators)"
        type: string
        required: false
        default: "quay.io/okderators"
      update_catalog:
        description: "Open a PR against the catalog index with the built bundle(s)"
        type: boolean
        required: false
        default: true
      catalog_branch:
        description: "Catalog index branch to target with the PR"
        type: string
        required: false
        default: "release-4.21"

name: Deploy Operator

jobs:
  deploy-operator:
    name: Deploy Operator
    runs-on: ubuntu-latest
    outputs:
      bundle_images: ${{ steps.bundles.outputs.bundle_images }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        # language=bash
        run: |
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Install jq (should be pre-installed on ubuntu-latest)
          sudo apt-get update && sudo apt-get install -y jq

          # Install operator-sdk
          export ARCH=$(case $(uname -m) in x86_64) echo -n amd64 ;; aarch64) echo -n arm64 ;; *) echo -n $(uname -m) ;; esac)
          export OS=$(uname | awk '{print tolower($0)}')
          export OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v1.36.1
          curl -LO ${OPERATOR_SDK_DL_URL}/operator-sdk_${OS}_${ARCH}
          chmod +x operator-sdk_${OS}_${ARCH}
          sudo mv operator-sdk_${OS}_${ARCH} /usr/local/bin/operator-sdk

      - name: Install Podman
        uses: redhat-actions/podman-install@main

      - name: Set up OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to Quay.io
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
          registry: quay.io

      - name: Configure git
        # language=bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pin build date
        # DATE is baked into every image tag by common.sh; pinning it lets
        # later steps reconstruct the exact image references build.sh pushed
        # language=bash
        run: echo "DATE=$(date +%Y-%m-%d-%H%M%S)" >> "$GITHUB_ENV"

      - name: Build and push operator
        env:
          NAMESPACE: ${{ inputs.operator }}
          BASE_REGISTRY: ${{ inputs.base_registry }}
        # language=bash
        run: |
          cd ${{ inputs.operator }}

          # Verify build.sh exists
          if [ ! -f "build.sh" ]; then
            echo "Error: build.sh not found in ${{ inputs.operator }}"
            exit 1
          fi

          # Run full build (init, build_containers, push_containers, build_bundle, deinit)
          echo "Building and deploying ${{ inputs.operator }}..."
          ./build.sh

          echo "Successfully built and pushed ${{ inputs.operator }}"

      - name: Collect bundle image references
        id: bundles
        env:
          NAMESPACE: ${{ inputs.operator }}
          BASE_REGISTRY: ${{ inputs.base_registry }}
        # language=bash
        run: |
          cd ${{ inputs.operator }}

          # Sourcing build.sh (guarded by BASH_SOURCE, so main() does not run)
          # re-derives the IMG_BUNDLE* variables with the pinned DATE
          BUNDLES=$(bash -c 'source ./build.sh >/dev/null 2>&1; for v in $(compgen -v IMG_BUNDLE); do echo "${!v}"; done') || BUNDLES=""

          if [ -z "$BUNDLES" ]; then
            echo "::warning::Could not determine bundle image references; the catalog PR job will be skipped"
          else
            echo "Bundle images:"
            echo "$BUNDLES"
          fi

          {
            echo "bundle_images<<BUNDLES_EOF"
            echo "$BUNDLES"
            echo "BUNDLES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create deployment summary
        if: success()
        # language=bash
        run: |
          echo "## Operator Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Operator:** \`${{ inputs.operator }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ inputs.base_registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Successfully deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images pushed:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.base_registry }}/${{ inputs.operator }}/*:*" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  catalog-pr:
    name: Catalog Index PR
    needs: deploy-operator
    if: inputs.update_catalog && needs.deploy-operator.outputs.bundle_images != ''
    uses: ./.github/workflows/catalog-pr.yaml
    with:
      operator: ${{ inputs.operator }}
      bundle_images: ${{ needs.deploy-operator.outputs.bundle_images }}
      catalog_branch: ${{ inputs.catalog_branch }}
    secrets: inherit
