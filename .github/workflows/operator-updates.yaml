name: Weekly Operator Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-operators:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        operator:
          - acm
          - cert-manager
          - cluster-logging
          - cluster-observability
          - data-foundation
          - external-secrets
          - gitops
          - ingress-node-firewall
          - local-storage
          - lvms
          - metallb
          - multicluster-engine
          - network-observability
          - nmstate
          - node-feature-discovery
          - oadp
          - pf-status-relay
          - service-mesh
          - sr-iov
          - web-terminal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        # language=bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update operator submodules
        id: update
        # language=bash
        run: |
          cd ${{ matrix.operator }}

          # Check if update function exists in build.sh
          if ! grep -q "^update()" build.sh; then
            echo "No update() function found in ${{ matrix.operator }}/build.sh"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Run the update function
          echo "Running update for ${{ matrix.operator }}..."
          source build.sh
          update

          # Check if there are any changes
          cd ..
          if git diff --quiet HEAD -- ${{ matrix.operator }}; then
            echo "No changes detected for ${{ matrix.operator }}"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected for ${{ matrix.operator }}"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Verify patches apply
        id: verify
        if: steps.update.outputs.updated == 'true'
        # language=bash
        run: |
          cd ${{ matrix.operator }}

          # Run init to verify patches apply correctly
          echo "Verifying patches apply for ${{ matrix.operator }}..."
          export NAMESPACE="${{ matrix.operator }}"
          ./build.sh init deinit

          # If init succeeds, patches applied correctly
          echo "Patches verified successfully for ${{ matrix.operator }}"
          echo "verified=true" >> $GITHUB_OUTPUT

      - name: Cleanup after verification
        if: steps.verify.outputs.verified == 'true'
        # language=bash
        run: |
          cd ${{ matrix.operator }}

          # Run deinit to clean up submodules
          export NAMESPACE="${{ matrix.operator }}"
          ./build.sh deinit

      - name: Commit and push changes
        if: steps.verify.outputs.verified == 'true'
        # language=bash
        run: |
          git add ${{ matrix.operator }}
          git commit -m "[${{ matrix.operator }}] Automatic weekly submodule update

          Updated submodules to latest upstream commits.
          Verified patches apply successfully.

          🤖 Automated update via GitHub Actions"

          # Push changes
          git push origin main

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Update Failed: ${{ matrix.operator }}`,
              body: `The weekly submodule update for \`${{ matrix.operator }}\` failed.
              
              **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              **Date:** ${new Date().toISOString()}
              
              Please check the workflow logs for details.`,
              labels: ['automation', 'update-failure']
            })

  summary:
    needs: update-operators
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Update summary
        # language=bash
        run: |
          echo "## Weekly Operator Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All operator updates completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
